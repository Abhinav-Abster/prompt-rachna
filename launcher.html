<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumbai 2070 - Choose Your Path</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Syncopate:wght@400;700;900&family=Orbitron:wght@400;700;900&family=Inter:wght@100;300;600;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --retro-bg: #000033;
            --future-bg: #010101;
            --retro-accent: #ffd700;
            --future-accent-cyan: #00f0ff;
            --future-accent-gold: #ffb703;
            --text-main: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Custom cursors used below */
        }

        body {
            height: 100vh;
            display: flex;
            background-color: #000;
            overflow: hidden;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        /* --- Custom Cursors --- */
        #cursor-retro, #cursor-future {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            display: none;
        }

        /* Retro Cursor: Pixel Arrow */
        #cursor-retro {
            width: 24px;
            height: 24px;
        }

        /* Future Cursor: Targeting Reticle */
        #cursor-future-outer {
            width: 40px;
            height: 40px;
            border: 1px solid var(--future-accent-cyan);
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        #cursor-future-inner {
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* --- Sides --- */
        .side {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            background-size: cover;
            background-position: center;
            filter: blur(10px); /* Base blur */
        }

        .side:hover {
            filter: blur(0); /* Clear on hover */
        }

        /* Overlays for readability and style */
        .side::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            transition: background 0.5s ease;
            z-index: 1;
        }

        .side:hover::after {
            background: rgba(0,0,0,0.3);
        }

        /* Retro Side */
        .side.retro {
            background-image: url('chapter 1.jpeg');
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .side.retro::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(0deg, rgba(18, 16, 16, 0) 50%, rgba(32, 32, 32, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* Future Side */
        .side.future {
            background-image: url('chapter 7.jpeg');
        }

        /* Future CRT/Glitch FX for Future Side Only */
        .future-fx {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
            background: rgba(255, 255, 255, 0.01);
            mix-blend-mode: overlay;
        }

        /* Content Styling */
        .content {
            z-index: 10;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .retro .title {
            font-family: 'Press Start 2P', cursive;
            color: var(--retro-accent);
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-shadow: 4px 4px #000;
        }

        .future .title {
            font-family: 'Syncopate', sans-serif;
            font-weight: 900;
            color: var(--future-accent-cyan);
            font-size: 3rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 25px;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.6);
        }

        .description {
            font-size: 1.2rem;
            max-width: 80%;
            margin: 0 auto;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        .retro .description {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            line-height: 1.6;
            color: #fff;
        }

        .future .description {
            font-family: 'Share Tech Mono', monospace;
            color: var(--future-accent-gold);
        }

        /* Hover Behavior */
        .side:hover {
            flex: 1.5;
        }

        .side:hover .content {
            transform: scale(1.05);
        }

        /* Center Divider */
        .divider {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            font-family: 'Syncopate', sans-serif;
            font-weight: 900;
            background: #000;
            color: #fff;
            padding: 15px;
            border: 2px solid var(--future-accent-cyan);
            border-radius: 4px;
            font-size: 0.9rem;
            pointer-events: none;
            letter-spacing: 4px;
            box-shadow: 0 0 20px var(--future-accent-cyan);
            transition: left 0.7s cubic-bezier(0.19, 1, 0.22, 1); /* Match side transition */
        }

        /* Logic to move VS with the expanding line */
        body:has(.retro:hover) .divider {
            left: 60%; /* 1.5 / (1.5 + 1.0) = 60% */
        }

        body:has(.future:hover) .divider {
            left: 40%; /* 1.0 / (1.5 + 1.0) = 40% */
        }

        /* HUD Hints */
        .hud-label {
            position: absolute;
            top: 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            letter-spacing: 4px;
            z-index: 10;
            opacity: 0.5;
        }
        .retro .hud-label { left: 20px; color: var(--retro-accent); }
        .future .hud-label { right: 20px; color: var(--future-accent-cyan); }

    </style>
</head>
<body>

    <!-- Retro Cursor -->
    <div id="cursor-retro">
        <svg width="24" height="24" shape-rendering="crispEdges">
            <polygon points="1,1 1,17 5,13 8,19 11,18 8,12 14,12" fill="white" stroke="black" stroke-width="1.5"/>
        </svg>
    </div>

    <!-- Future Cursor -->
    <div id="cursor-future">
        <div id="cursor-future-outer"></div>
        <div id="cursor-future-inner"></div>
    </div>

    <!-- Retro Path -->
    <a href="index.html" class="side retro" id="side-retro">
        <div class="hud-label">SYSTEM_LGC.OLD_MUMBAI</div>
        <div class="content">
            <h2 class="title">PIXEL PATH</h2>
            <p class="description">Reminisce the past.<br>A nostalgic JRPG experience with 8-bit charm.</p>
        </div>
    </a>

    <div class="divider">VS</div>

    <!-- Future Path -->
    <a href="index2.html" class="side future" id="side-future">
        <div class="future-fx"></div>
        <div class="hud-label">SAGE_CORE.NEW_MUMBAI</div>
        <div class="content">
            <h2 class="title">PARALLAX AVENUE</h2>
            <p class="description">Explore the future.<br>Ultra-cinematic immersion and liquid visuals.</p>
        </div>
    </a>

    <script>
        const sideRetro = document.getElementById('side-retro');
        const sideFuture = document.getElementById('side-future');
        const cursorRetroDiv = document.getElementById('cursor-retro');
        const cursorFutureDiv = document.getElementById('cursor-future');

        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            // Retro Side Logic
            if (x < window.innerWidth / 2) {
                cursorRetroDiv.style.display = 'block';
                cursorFutureDiv.style.display = 'none';
                cursorRetroDiv.style.left = x + 'px';
                cursorRetroDiv.style.top = y + 'px';
            } 
            // Future Side Logic
            else {
                cursorRetroDiv.style.display = 'none';
                cursorFutureDiv.style.display = 'block';
                cursorFutureDiv.style.left = x + 'px';
                cursorFutureDiv.style.top = y + 'px';
            }
        });

        // Hide cursors when leaving window
        document.addEventListener('mouseleave', () => {
            cursorRetroDiv.style.display = 'none';
            cursorFutureDiv.style.display = 'none';
        });
    </script>
</body>
</html>
